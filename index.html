<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h1>TOURNAMENT HUB</h1>
        
        <div class="tournament-nav">
            <button class="nav-btn" onclick="switchSection('OVERALL')">🏠 OVERALL</button>
            <button class="nav-btn" onclick="switchSection('ELITE DIV S7')">🛡️ ELITE S7</button>
            <button class="nav-btn" onclick="switchSection('ULTIMATE PLAYER')">🔥 ULTIMATE</button>
        </div>

        <div class="workspace">
            <div class="controls">
                <input type="text" id="nameInput" placeholder="Gamer Name" oninput="updateCard()">
                <input type="number" id="ratingInput" placeholder="Rating" oninput="updateCard()">
                <input type="text" id="yearInput" placeholder="Season" oninput="updateCard()">
                
                <select id="cardStyleInput" onchange="updateCard()">
                    <option value="epic">✨ Epic</option>
                    <option value="trending">🔥 Trending</option>
                    <option value="standard">🔵 Standard</option>
                </select>

                <div class="stats-input-grid">
                    <input type="number" id="gsInput" placeholder="GS" oninput="updateCard()">
                    <input type="number" id="csInput" placeholder="CS" oninput="updateCard()">
                    <input type="text" id="amrInput" placeholder="AMR" oninput="updateCard()">
                </div>

                <!-- IMAGE ADJUSTMENT TOOLS -->
                <div class="adjust-tools">
                    <label>Zoom Image:</label>
                    <input type="range" id="zoomInput" min="50" max="200" value="100" oninput="adjustImage()">
                    <label>Move Horizontal:</label>
                    <input type="range" id="posXInput" min="0" max="100" value="50" oninput="adjustImage()">
                    <label>Move Vertical:</label>
                    <input type="range" id="posYInput" min="0" max="100" value="50" oninput="adjustImage()">
                </div>

                <input type="file" id="imageLoader" accept="image/*" onchange="handleImageUpload(event)">
                <button class="download-btn" onclick="downloadCard()">DOWNLOAD CARD</button>
            </div>

            <div class="card epic" id="card">
                <div class="card-bg"></div>
                <div class="card-watermark" id="cardWatermark">OVERALL</div>
                <!-- IMAGE CONTAINER -->
                <div class="player-frame" id="playerFrame"></div>
                
                <div class="rating-badge"><span id="cardRating">77</span></div>
                
                <div class="live-perf-bar">
                    <div class="stat-pill"><span class="label">GS</span><span id="cardGS">0</span></div>
                    <div class="stat-pill"><span class="label">CS</span><span id="cardCS">0</span></div>
                    <div class="stat-pill amr-highlight"><span class="label">AMR</span><span id="cardAMR">0.0</span></div>
                </div>
                
                <div class="card-details">
                    <div class="season-year" id="cardYear">2026</div>
                    <div class="player-name" id="cardName">PLAYER NAME</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
