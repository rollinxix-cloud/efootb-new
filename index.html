<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Tournament Pro Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h1>TOURNAMENT HUB</h1>
        
        <!-- Interactive Category Selectors -->
        <div class="navigation-container">
            <label for="tournamentSelector">SELECT ACTIVE TOURNAMENT:</label>
            <select id="tournamentSelector" onchange="handleTournamentChange()">
                <option value="OVERALL">🏠 1. Overall</option>
                <option value="ELITE LEAGUE">💎 2. Elite League</option>
                <option value="ELITE DIVISION LEAGUE">🛡️ 3. Elite Division League</option>
                <option value="ELITE DIV S7">🏆 4. Elite Division League (Season 7)</option>
                <option value="PES LEAGUE CAMP">⛺ 5. PES League Camp</option>
                <option value="ULTIMATE PLAYER">🔥 6. Ultimate Player</option>
            </select>
        </div>

        <div class="workspace">
            <div class="controls">
                <input type="text" id="nameInput" placeholder="Gamer Name" oninput="updateCard()">
                <input type="number" id="ratingInput" placeholder="Rating" oninput="updateCard()">
                <input type="text" id="yearInput" placeholder="Season / Year" oninput="updateCard()">
                
                <select id="cardStyleInput" onchange="updateCard()">
                    <option value="epic">✨ Epic Edition</option>
                    <option value="trending">🔥 Trending Edition</option>
                    <option value="standard">🔵 Standard Edition</option>
                </select>

                <!-- Star Rating Feature Selector -->
                <select id="starRatingInput" onchange="updateCard()">
                    <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                    <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                    <option value="3">⭐⭐⭐ 3 Stars</option>
                    <option value="2">⭐⭐ 2 Stars</option>
                </select>

                <!-- Tactical Attributes Input Grid -->
                <div class="stats-input-grid">
                    <!-- Team Playstyle Dropdown Selector -->
                    <select id="teamPlaystyleInput" onchange="updateCard()">
                        <option value="Possession Game">Possession Game</option>
                        <option value="Quick Counter">Quick Counter</option>
                        <option value="Long Ball Counter">Long Ball Counter</option>
                        <option value="Out Wide">Out Wide</option>
                        <option value="Long Ball">Long Ball</option>
                    </select>
                </div>

                <!-- UPDATED SEASON 7 PANEL WITH TELEMETRY TRACKERS -->
                <div id="season7Panel" class="special-panel hidden">
                    <h3>⚠️ Season 7 Active Match Settings</h3>
                    <div class="s7-config-row">
                        <select id="mdSelector" onchange="handleMatchdayTypeChange()">
                            <option value="MD1_MD2">MD 1 & MD 2 (Dual Match)</option>
                            <option value="MD3_MD4">MD 3 & MD 4 (Dual Match)</option>
                            <option value="MD5_MD6">MD 5 & MD 6 (Dual Match)</option>
                            <option value="MD7_MD8">MD 7 & MD 8 (Dual Match)</option>
                            <option value="MD9">MD 9 (Single Final Match)</option>
                        </select>
                    </div>
                    
                    <div class="s7-inputs-grid">
                        <div class="input-block" id="blockMD_A">
                            <label id="labelMD_A">MD 1 Score:</label>
                            <input type="text" id="scorelineInputA" placeholder="e.g., 0-0" oninput="updateCard()">
                        </div>
                        <div class="input-block" id="blockMD_B">
                            <label id="labelMD_B">MD 2 Score:</label>
                            <input type="text" id="scorelineInputB" placeholder="e.g., 12-3" oninput="updateCard()">
                        </div>
                    </div>

                    <!-- Dynamic Performance Trackers Grid -->
                    <div class="s7-stats-row">
                        <div class="input-block">
                            <label>GS:</label>
                            <input type="number" id="gsInput" placeholder="Goals" value="12" oninput="updateCard()">
                        </div>
                        <div class="input-block">
                            <select id="csGcSelector" onchange="updateCard()">
                                <option value="CS">CS (Clean Sheet)</option>
                                <option value="GC">GC (Goals Conceded)</option>
                            </select>
                            <input type="number" id="csGcInput" placeholder="Value" value="2" oninput="updateCard()">
                        </div>
                        <div class="input-block">
                            <label>AMG:</label>
                            <input type="text" id="amgInput" placeholder="Rating" value="9.1" oninput="updateCard()">
                        </div>
                    </div>
                </div>

                <!-- Image Adjustments Layout -->
                <div class="adjust-tools">
                    <span class="tool-title">🖼️ Image Customization</span>
                    <label>Zoom Graphic:</label>
                    <input type="range" id="zoomInput" min="0.5" max="3.5" step="0.05" value="1.0" oninput="adjustImage()">
                    <label>Move Left / Right:</label>
                    <input type="range" id="posXInput" min="-300" max="300" step="1" value="0" oninput="adjustImage()">
                    <label>Move Up / Down:</label>
                    <input type="range" id="posYInput" min="-300" max="300" step="1" value="0" oninput="adjustImage()">
                </div>

                <div class="file-upload-wrapper">
                    <input type="file" id="imageLoader" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                
                <button class="download-btn" onclick="downloadCard()">DOWNLOAD PERFECT CARD</button>
            </div>

            <!-- Main Card Design Structure -->
            <div class="card-export-wrapper">
                <div class="card epic" id="card">
                    <div class="card-bg"></div>
                    <div class="card-watermark" id="cardWatermark">OVERALL</div>
                    
                    <!-- Structural container containing a true img node -->
                    <div class="player-frame" id="playerFrameContainer">
                        <img id="playerImage" src="data:image/gif;blank" alt="Player">
                    </div>
                    
                    <!-- Core Rating & Stars layout cluster -->
                    <div class="rating-cluster">
                        <div class="rating-badge"><span id="cardRating">90</span></div>
                        <div class="stars-badge" id="cardStars">⭐⭐⭐⭐⭐</div>
                    </div>
                    
                    <!-- Pro eFootball Player Playstyle Showcase (UPDATED WITH INNER SPAN FOR SLANT) -->
                    <div class="player-attributes">
                        <div class="attr-pill-large" id="cardPlaystyle"><span>POSSESSION GAME</span></div>
                    </div>

                    <!-- Season 7 Exclusive Performance Overlay Matrix -->
                    <div id="cardPerfBar" class="live-perf-bar hidden-element">
                        <div class="stat-pill"><span class="label">GS</span><span id="cardGS">12</span></div>
                        <div class="stat-pill"><span class="label" id="cardCsGcLabel">CS</span><span id="cardCSGC">2</span></div>
                        <div class="stat-pill amr-highlight"><span class="label">AMG</span><span id="cardAMG">9.1</span></div>
                    </div>

                    <!-- Dynamic Stacked Matchday Display Container -->
                    <div id="cardScoreContainer" class="scoreline-display-wrapper hidden-element">
                        <!-- Built dynamically in JavaScript -->
                    </div>
                    
                    <!-- Upgraded Premium Identity Block -->
                    <div class="card-identity-block">
                        <div class="deco-slits"><span></span><span></span><span></span></div>
                        <div class="identity-content">
                            <div class="season-year" id="cardYear">ELITE DIVISION LEAGUE S7</div>
                            <div class="player-name" id="cardName">AMAX HOOD</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
                            </html>
